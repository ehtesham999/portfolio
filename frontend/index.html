<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <!-- Modern font -> Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- HEADER -->
    <header class="navbar">
        <div class="logo">Portfolio</div>
        <nav>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section id="hero" class="hero-section">
        <div class="hero-content">
            <h1>Hi, I'm a Backend Developer</h1>
            <p>Building robust, scalable applications from the ground up.</p>
            <a href="#projects" class="btn primary-btn">View My Work</a>
        </div>
    </section>

    <!-- SKILLS SECTION -->
    <section id="skills" class="skills-section">
        <div class="container">
            <h2>My Skills</h2>
            <div id="skills-container" class="skills-grid">
                <!-- Skills injected here via JS -->
            </div>
        </div>
    </section>

    <!-- PROJECTS SECTION -->
    <section id="projects" class="projects-section">
        <div class="container">
            <h2>Featured Projects</h2>
            <div id="projects-container" class="projects-grid">
                <!-- Projects injected here via JS -->
            </div>
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section id="contact" class="contact-section">
        <div class="container">
            <h2>Let's Connect</h2>
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn primary-btn">Send Message</button>
            </form>
            <div id="form-status" class="form-status"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My Portfolio. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
